<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – MedComm</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

  <div class="auth-page">
    <!-- Visual Panel -->
    <div class="auth-visual">
      <div class="auth-visual-icon">🩺</div>
      <h2>Welcome Back</h2>
      <p>Sign in to your MedComm account to access your medical image library and generate new illustrations.</p>
    </div>

    <!-- Form Panel -->
    <div class="auth-form-container">
      <div class="auth-form-box">
        <a href="/" style="color:var(--primary);font-weight:600;font-size:0.9rem;">← Back to Home</a>
        <br><br>
        <h1>Sign In</h1>
        <p class="subtitle">Enter your credentials to access your dashboard.</p>

        <div id="form-alert" class="alert"></div>

        <form id="login-form" novalidate>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="doctor@hospital.com" required />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Your password" required />
          </div>

          <button type="submit" class="btn btn-primary btn-full btn-lg">Sign In</button>
        </form>

        <div class="form-footer">
          Don't have an account? <a href="/register">Register here</a>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/auth.js"></script>
</body>
</html>
