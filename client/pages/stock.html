<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Images – MedComm</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="/" class="navbar-brand">Med<span>Comm</span></a>
    <ul>
      <li><a href="/dashboard">Dashboard</a></li>
      <li><a href="/stock" class="active">Stock Images</a></li>
    </ul>
    <div class="nav-auth">
      <button class="btn btn-outline btn-sm logout-btn">Logout</button>
    </div>
  </nav>

  <!-- LAYOUT -->
  <div class="dashboard-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebar-avatar">D</div>
        <div class="sidebar-user-info">
          <div class="name" id="sidebar-name">Loading...</div>
          <div class="role" id="sidebar-role">Doctor</div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a href="/dashboard">
          <span class="nav-icon">🏠</span> Dashboard
        </a>
        <a href="/stock" class="active">
          <span class="nav-icon">🖼️</span> Stock Images
        </a>
        <button class="btn logout-btn" style="width:100%;text-align:left;padding:0.75rem 1rem;gap:0.75rem;display:flex;align-items:center;">
          <span>🚪</span> Logout
        </button>
      </nav>
    </aside>

    <!-- MAIN -->
    <main class="main-content">
      <div class="page-header">
        <h2>Stock Image Repository</h2>
        <p>Browse community-generated medical illustrations by specialty</p>
      </div>

      <!-- Category Filters -->
      <div id="filter-bar" class="filter-bar"></div>

      <!-- Image Grid -->
      <div id="stock-grid" class="image-grid">
        <div class="loading-wrap">
          <div class="spinner"></div>
          <p>Loading stock images...</p>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="/js/auth.js"></script>
  <script type="module" src="/js/stock.js"></script>
</body>
</html>
